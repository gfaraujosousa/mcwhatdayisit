name: Release

on:
  workflow_dispatch:
    inputs:
      mod_version:
        description: Mod version to publish
        required: true
        default: "0.1.0"
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.mod_version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - minecraft: "1.21"
            minecraft_range: "[1.21,1.21.1)"
            neoforge: "21.0.167"
            neoforge_range: "[21.0.167,21.1)"
            neoform: "1.21-20240613.152323"
          - minecraft: "1.21.1"
            minecraft_range: "[1.21.1,1.21.2)"
            neoforge: "21.1.233"
            neoforge_range: "[21.1.233,21.2)"
            neoform: "1.21.1-20240808.144430"
          - minecraft: "1.21.3"
            minecraft_range: "[1.21.3,1.21.4)"
            neoforge: "21.3.96"
            neoforge_range: "[21.3.96,21.4)"
            neoform: "1.21.3-20241023.131943"
          - minecraft: "1.21.4"
            minecraft_range: "[1.21.4,1.21.5)"
            neoforge: "21.4.157"
            neoforge_range: "[21.4.157,21.5)"
            neoform: "1.21.4-20241203.161809"
          - minecraft: "1.21.5"
            minecraft_range: "[1.21.5,1.21.6)"
            neoforge: "21.5.97"
            neoforge_range: "[21.5.97,21.6)"
            neoform: "1.21.5-20250325.162830"
          - minecraft: "1.21.8"
            minecraft_range: "[1.21.8,1.21.9)"
            neoforge: "21.8.53"
            neoforge_range: "[21.8.53,21.9)"
            neoform: "1.21.8-20250717.133445"
          - minecraft: "1.21.10"
            minecraft_range: "[1.21.10,1.21.11)"
            neoforge: "21.10.64"
            neoforge_range: "[21.10.64,21.11)"
            neoform: "1.21.10-20251010.172816"
          - minecraft: "1.21.11"
            minecraft_range: "[1.21.11,1.21.12)"
            neoforge: "21.11.42"
            neoforge_range: "[21.11.42,21.12)"
            neoform: "1.21.11-20251209.172050"
    env:
      MOD_VERSION: ${{ inputs.mod_version }}
      RELEASE_TAG: v${{ inputs.mod_version }}+mc${{ matrix.minecraft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build
        run: >
          bash ./gradlew clean check build
          -Pminecraft_version=${{ matrix.minecraft }}
          -Pminecraft_version_range='${{ matrix.minecraft_range }}'
          -Pneo_version=${{ matrix.neoforge }}
          -Pneo_version_range='${{ matrix.neoforge_range }}'
          -Pneoform_version=${{ matrix.neoform }}
          -Pmod_version=${{ env.MOD_VERSION }}

      - name: Stage release jar
        run: |
          mkdir -p release-assets
          find neoforge/build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-sources.jar" -exec cp {} release-assets/ \;
          release_jar_count=$(find release-assets -maxdepth 1 -type f -name "*.jar" | wc -l)
          test "$release_jar_count" -gt 0

      - name: Upload release jar artifact
        uses: actions/upload-artifact@v5
        with:
          name: whatdayisit-neoforge-mc${{ matrix.minecraft }}
          path: release-assets/*.jar
          if-no-files-found: error

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists"
          else
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "$RELEASE_TAG"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "What days is it? ${{ env.MOD_VERSION }} for Minecraft ${{ matrix.minecraft }}"
          files: release-assets/*.jar
          fail_on_unmatched_files: true
          body: |
            NeoForge build for Minecraft ${{ matrix.minecraft }}.

            Mod version: ${{ env.MOD_VERSION }}
            NeoForge: ${{ matrix.neoforge }}
            NeoForm: ${{ matrix.neoform }}
            Java: 21
